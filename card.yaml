type: vertical-stack
cards:
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        entity: sensor.real_electricity_price_current_price
        content: "{{ states('sensor.real_electricity_price_current_price') }} €/kWh"
        icon: mdi:currency-eur
        icon_color: |-
          {% if states('sensor.real_electricity_price_current_price')|float(0)
               <= states('number.real_electricity_price_acceptable_price')|float(0) %}
            green
          {% else %}
            red
          {% endif %}
        tap_action:
          action: more-info
  # ── SmartEVSE 1 status ──
  - type: custom:mushroom-template-card
    entity: sensor.smartevse_1_state
    entity_id:
      - sensor.smartevse_1_state
      - sensor.smartevse_1_evplugstate
      - select.smartevse_1_mode
      - sensor.smartevse_1_chargecurrent
      - sensor.smartevse_1_maxcurrent
      - number.smartevse_1_chargecurrentoverride
      - sensor.smartevse_2_evplugstate
    primary: |-
      {% if is_state('sensor.smartevse_1_evplugstate','Connected') %}
        {% set s = states('sensor.smartevse_1_state')|trim %}
        {% if s == 'Charging' %}
          SmartEVSE 1: Charging
        {% elif s == 'Ready to Charge' %}
          SmartEVSE 1: Ready to charge
        {% elif s == 'Connected to EV' %}
          SmartEVSE 1: Connected to EV
        {% elif s == 'Charging Stopped' %}
          SmartEVSE 1: Charging stopped
        {% elif s == 'Stop Charging' %}
          SmartEVSE 1: Charging stopping
        {% else %}
          SmartEVSE 1: Idle
        {% endif %}
      {% else %}
        SmartEVSE 1: Unplugged
      {% endif %}
    secondary: >-
      Plug: {{ states('sensor.smartevse_1_evplugstate') }}

      Mode: {{ states('select.smartevse_1_mode') }}

      Charging current: {{ states('sensor.smartevse_1_chargecurrent') }} A

      Max current: {{ states('sensor.smartevse_1_maxcurrent') }} A | Override: {{ states('number.smartevse_1_chargecurrentoverride') }} A
    icon: >-
      {% set s = states('sensor.smartevse_1_state')|trim %} {% if not
      is_state('sensor.smartevse_1_evplugstate','Connected') %}
        mdi:power-plug-off-outline
      {% elif s == 'Charging' %}
        mdi:ev-station
      {% elif s in ['Ready to Charge','Connected to EV'] %}
        mdi:ev-plug-type2
      {% else %}
        mdi:ev-station
      {% endif %}
    multiline_secondary: true
    tap_action:
      action: none
    color: >-
      {% set s = states('sensor.smartevse_1_state')|trim %}
      {% set cur = states('sensor.smartevse_1_chargecurrent')|float(0) %}
      {% if not is_state('sensor.smartevse_1_evplugstate','Connected') %}
        grey
      {% elif s == 'Charging' and cur >= 1 %}
        green
      {% elif s == 'Ready to Charge' %}
        blue
      {% elif s in ['Connected to EV'] or (s == 'Charging' and cur < 1) %}
        amber
      {% elif s == 'Stop Charging' %}
        orange
      {% elif s == 'Charging Stopped' %}
        blue
      {% else %}
        grey
      {% endif %}
    features_position: bottom
  # ── SmartEVSE 2 status ──
  - type: custom:mushroom-template-card
    entity: sensor.smartevse_2_state
    entity_id:
      - sensor.smartevse_2_state
      - sensor.smartevse_2_evplugstate
      - select.smartevse_2_mode
      - sensor.smartevse_2_chargecurrent
      - sensor.smartevse_2_maxcurrent
      - number.smartevse_2_chargecurrentoverride
      - sensor.smartevse_1_evplugstate
    primary: |-
      {% if is_state('sensor.smartevse_2_evplugstate','Connected') %}
        {% set s = states('sensor.smartevse_2_state')|trim %}
        {% if s == 'Charging' %}
          SmartEVSE 2: Charging
        {% elif s == 'Ready to Charge' %}
          SmartEVSE 2: Ready to charge
        {% elif s == 'Connected to EV' %}
          SmartEVSE 2: Connected to EV
        {% elif s == 'Charging Stopped' %}
          SmartEVSE 2: Charging stopped
        {% elif s == 'Stop Charging' %}
          SmartEVSE 2: Charging stopping
        {% else %}
          SmartEVSE 2: Idle
        {% endif %}
      {% else %}
        SmartEVSE 2: Unplugged
      {% endif %}
    secondary: >-
      Plug: {{ states('sensor.smartevse_2_evplugstate') }}

      Mode: {{ states('select.smartevse_2_mode') }}

      Charging current: {{ states('sensor.smartevse_2_chargecurrent') }} A

      Max current: {{ states('sensor.smartevse_2_maxcurrent') }} A | Override: {{ states('number.smartevse_2_chargecurrentoverride') }} A
    icon: >-
      {% set s = states('sensor.smartevse_2_state')|trim %} {% if not
      is_state('sensor.smartevse_2_evplugstate','Connected') %}
        mdi:power-plug-off-outline
      {% elif s == 'Charging' %}
        mdi:ev-station
      {% elif s in ['Ready to Charge','Connected to EV'] %}
        mdi:ev-plug-type2
      {% else %}
        mdi:ev-station
      {% endif %}
    multiline_secondary: true
    tap_action:
      action: none
    color: >-
      {% set s = states('sensor.smartevse_2_state')|trim %}
      {% set cur = states('sensor.smartevse_2_chargecurrent')|float(0) %}
      {% if not is_state('sensor.smartevse_2_evplugstate','Connected') %}
        grey
      {% elif s == 'Charging' and cur >= 1 %}
        green
      {% elif s == 'Ready to Charge' %}
        blue
      {% elif s in ['Connected to EV'] or (s == 'Charging' and cur < 1) %}
        amber
      {% elif s == 'Stop Charging' %}
        orange
      {% elif s == 'Charging Stopped' %}
        blue
      {% else %}
        grey
      {% endif %}
    features_position: bottom
  # ── Shared schedule info ──
  - type: custom:mushroom-template-card
    entity: input_boolean.charging_schedule_state
    entity_id:
      - input_boolean.charging_schedule_state
      - schedule.charge_schedule
    primary: Schedule
    secondary: >-
      {%- set gate = is_state('input_boolean.charging_schedule_state','on') -%}
      {%- if gate -%}
        {%- set sched_on = is_state('schedule.charge_schedule','on') -%}
        {%- set ne = state_attr('schedule.charge_schedule','next_event') -%}
        {%- if sched_on -%}
      On now{%- if ne -%}, ends {{ as_timestamp(ne) |
      timestamp_custom('%a %H:%M', true) }}{%- endif -%}
        {%- else -%}
      Armed{%- if ne -%}, starts at {{ as_timestamp(ne) |
      timestamp_custom('%a %H:%M', true) }}{%- endif -%}
        {%- endif -%}
      {%- else -%} Disabled {%- endif -%}
    icon: mdi:calendar-clock
    icon_color: >-
      {% if is_state('input_boolean.charging_schedule_state','on') and
      is_state('schedule.charge_schedule','on') %}
        green
      {% elif is_state('input_boolean.charging_schedule_state','on') %}
        blue
      {% else %}
        grey
      {% endif %}
    tap_action:
      action: none
    multiline_secondary: false
  # ── Force charge controls (shared, check either plug) ──
  - type: custom:mushroom-template-card
    entity: input_boolean.force_charge_state
    primary: Force charge
    secondary: |-
      {% set any_connected = is_state('sensor.smartevse_1_evplugstate','Connected') or is_state('sensor.smartevse_2_evplugstate','Connected') %}
      {% if is_state('input_boolean.force_charge_state','on') %}
        {% if not any_connected %}
          Waiting EV Plug to be connected
        {% else %}
          Active
        {% endif %}
      {% else %}
        Tap to start
      {% endif %}
    icon: mdi:lightning-bolt
    icon_color: >-
      {% set any_connected = is_state('sensor.smartevse_1_evplugstate','Connected') or is_state('sensor.smartevse_2_evplugstate','Connected') %}
      {% if is_state('input_boolean.force_charge_state','on') and not
      any_connected %}
        orange
      {% elif is_state('input_boolean.force_charge_state','on') %}
        green
      {% else %}
        grey
      {% endif %}
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    fill_container: true
  - type: custom:mushroom-template-card
    entity: input_boolean.force_charge_with_acceptable_electricity_price_state
    primary: >-
      Force charge when ≤ {{
      states('number.real_electricity_price_acceptable_price') }} €/kWh
    secondary: >-
      {% set any_connected = is_state('sensor.smartevse_1_evplugstate','Connected') or is_state('sensor.smartevse_2_evplugstate','Connected') %}
      {% if
      is_state('input_boolean.force_charge_with_acceptable_electricity_price_state','on')
      %}
        {% if not any_connected %}
          Waiting EV Plug to be connected
        {% else %}
          {% set price = states('sensor.real_electricity_price_current_price')|float(0) %}
          {% set accept = states('number.real_electricity_price_acceptable_price')|float(0) %}
          {% if price <= accept %}
            Acceptable price, charging
          {% else %}
            Waiting for price
          {% endif %}
        {% endif %}
      {% else %}
        Tap to arm
      {% endif %}
    icon: mdi:currency-eur
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    color: >-
      {% set any_connected = is_state('sensor.smartevse_1_evplugstate','Connected') or is_state('sensor.smartevse_2_evplugstate','Connected') %}
      {% if
      is_state('input_boolean.force_charge_with_acceptable_electricity_price_state','on')
      and not any_connected %}
        orange
      {% elif
      is_state('input_boolean.force_charge_with_acceptable_electricity_price_state','on')
      %}
        green
      {% else %}
        grey
      {% endif %}
    features_position: bottom
  - type: custom:mushroom-template-card
    entity: input_boolean.force_charge_with_timer_state
    primary: Force charge for {{ states('input_datetime.force_charge_time') }}
    secondary: |-
      {% set any_connected = is_state('sensor.smartevse_1_evplugstate','Connected') or is_state('sensor.smartevse_2_evplugstate','Connected') %}
      {% if is_state('input_boolean.force_charge_with_timer_state','on') %}
        {% if not any_connected %}
          Waiting EV Plug to be connected
        {% else %}
          Active
        {% endif %}
      {% else %}
        Tap to arm
      {% endif %}
    icon: mdi:timer-sand
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    color: >-
      {% set any_connected = is_state('sensor.smartevse_1_evplugstate','Connected') or is_state('sensor.smartevse_2_evplugstate','Connected') %}
      {% if is_state('input_boolean.force_charge_with_timer_state','on') and not
      any_connected %}
        orange
      {% elif is_state('input_boolean.force_charge_with_timer_state','on') %}
        green
      {% else %}
        grey
      {% endif %}
    features_position: bottom
  - type: entities
    show_header_toggle: false
    entities:
      - entity: input_boolean.charging_schedule_state
        name: Charge with schedule
      - entity: schedule.charge_schedule
        name: Charge schedule
      - entity: input_number.charger_current_balance
        name: Current balance (SmartEVSE 1 ⇄ SmartEVSE 2)
      - entity: number.real_electricity_price_acceptable_price
        name: Acceptable price
      - entity: input_datetime.force_charge_time
        name: Force timer
        icon: mdi:timer-sand
